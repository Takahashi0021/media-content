<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Content - Главная</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: #667eea; font-size: 24px; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #333; padding: 8px 15px; border-radius: 5px; transition: all 0.3s; }
        .nav a:hover, .nav a.active { background: #667eea; color: white; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .section { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .section h3 { color: #667eea; margin-bottom: 15px; font-size: 22px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .movie-card, .series-card { background: #f8f9fa; border-radius: 10px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .movie-card:hover, .series-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .movie-card img, .series-card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h4 { color: #667eea; margin-bottom: 8px; }
        .rating { color: #ffc107; font-weight: bold; margin: 5px 0; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .pagination button { background: #667eea; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .pagination button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { text-align: center; padding: 50px; color: white; font-size: 18px; }
        .message { padding: 12px; margin-bottom: 20px; border-radius: 5px; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #f8f9fa; border: none; border-radius: 5px; cursor: pointer; }
        .tab.active { background: #667eea; color: white; }
    </style>
</head>
<body>
    <div id="app"><div class="loading">Загрузка...</div></div>
    <script>
        const API_BASE = '/api';
        let currentPage = 1;
        let itemsPerPage = 12;
        let currentTab = 'movies';

        function getToken() { return localStorage.getItem('token'); }
        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }

        async function request(method, endpoint, body = null) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(`${API_BASE}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : null });
            if (response.status === 401) { localStorage.removeItem('token'); window.location.href = '/login.html'; }
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Ошибка');
            return data;
        }

        async function loadDashboard() {
            const token = getToken();
            if (!token) { window.location.href = '/login.html'; return; }

            try {
                const userData = await request('GET', '/user');
                const movies = await request('GET', '/movies');
                const series = await request('GET', '/series');
                const moviesList = movies.data || movies;
                const seriesList = series.data || series;

                renderPage(userData, moviesList, seriesList);
            } catch (error) { console.error(error); }
        }

        function renderPage(userData, moviesList, seriesList) {
            const currentList = currentTab === 'movies' ? moviesList : seriesList;
            const totalPages = Math.ceil(currentList.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginatedItems = currentList.slice(start, start + itemsPerPage);

            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1>🎬 Media Content API</h1>
                        <div class="nav">
                            <a href="/index.html" class="active">Главная</a>
                            <a href="/movies.html">Управление</a>
                            <a href="/favorites.html">Избранное</a>
                            <a href="/reviews.html">Отзывы</a>
                            <a href="/external.html">Поиск</a>
                        </div>
                        <div class="user-info">
                            <span>👤 ${userData.user.username}</span>
                            <button class="logout-btn" onclick="logout()">Выйти</button>
                        </div>
                    </div>
                    <div class="tabs">
                        <button class="tab ${currentTab === 'movies' ? 'active' : ''}" onclick="switchTab('movies')">🎬 Фильмы (${moviesList.length})</button>
                        <button class="tab ${currentTab === 'series' ? 'active' : ''}" onclick="switchTab('series')">📺 Сериалы (${seriesList.length})</button>
                    </div>
                    <div class="section">
                        <h3>${currentTab === 'movies' ? '🎬 Все фильмы' : '📺 Все сериалы'}</h3>
                        <div class="grid">
                            ${paginatedItems.map(item => `
                                <div class="${currentTab === 'movies' ? 'movie-card' : 'series-card'}" onclick="location.href='/${currentTab === 'movies' ? 'movie-detail' : 'series-detail'}.html?id=${item.id}'">
                                    ${item.poster_url ? `<img src="${item.poster_url}" alt="${item.title}">` : `<div style="height:300px; background:#ddd; display:flex; align-items:center; justify-content:center;">🎬</div>`}
                                    <div class="card-info">
                                        <h4>${item.title}</h4>
                                        <p>📅 ${item.release_year || 'Н/Д'}</p>
                                        <p class="rating">⭐ ${item.rating ? item.rating.toFixed(1) : 'Нет оценок'}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="pagination">
                            <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>◀ Назад</button>
                            <span>Страница ${currentPage} из ${totalPages || 1}</span>
                            <button onclick="changePage(1)" ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}>Вперед ▶</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            loadDashboard();
        }

        function changePage(delta) {
            currentPage += delta;
            loadDashboard();
        }

        loadDashboard();
    </script>
</body>
</html>
