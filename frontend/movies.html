<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильмы - Media Content</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
        }

        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            color: #333;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .nav a:hover, .nav a.active {
            background: #667eea;
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button.danger {
            background: #dc3545;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            transition: transform 0.3s;
        }

        .movie-card:hover {
            transform: translateY(-5px);
        }

        .movie-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .movie-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .rating {
            color: #ffc107;
            font-weight: bold;
            font-size: 18px;
        }

        .message {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_BASE = '/api';

        function getToken() {
            return localStorage.getItem('token');
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        async function request(method, endpoint, body = null) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            const response = await fetch(`${API_BASE}${endpoint}`, {
                method,
                headers,
                body: body ? JSON.stringify(body) : null
            });

            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login.html';
            }

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Ошибка');
            return data;
        }

        async function loadMovies() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            try {
                const userData = await request('GET', '/user');
                const movies = await request('GET', '/movies');
                const moviesList = movies.data || movies;

                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="header">
                            <h1>🎬 Управление фильмами</h1>
                            <div class="nav">
                                <a href="/index.html">Главная</a>
                                <a href="/movies.html" class="active">Фильмы</a>
                                <a href="/series.html">Сериалы</a>
                                <a href="/favorites.html">Избранное</a>
                                <a href="/reviews.html">Отзывы</a>
                                <a href="/external.html">Поиск</a>
                            </div>
                            <div class="user-info">
                                <span>👤 ${userData.user.username}</span>
                                <button class="logout-btn" onclick="logout()">Выйти</button>
                            </div>
                        </div>

                        <div class="card">
                            <h3>➕ Добавить фильм</h3>
                            <div id="addForm">
                                <div class="form-group">
                                    <label>Название *</label>
                                    <input type="text" id="title" placeholder="Название фильма">
                                </div>
                                <div class="form-group">
                                    <label>Описание</label>
                                    <textarea id="description" rows="3" placeholder="Описание фильма"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Год выпуска</label>
                                    <input type="number" id="releaseYear" placeholder="2024">
                                </div>
                                <div class="form-group">
                                    <label>Длительность (мин)</label>
                                    <input type="number" id="duration" placeholder="120">
                                </div>
                                <div class="form-group">
                                    <label>Жанр</label>
                                    <input type="text" id="genre" placeholder="Боевик, драма, комедия">
                                </div>
                                <div class="form-group">
                                    <label>Режиссёр</label>
                                    <input type="text" id="director" placeholder="Имя режиссёра">
                                </div>
                                <div class="form-group">
                                    <label>URL постера</label>
                                    <input type="text" id="posterUrl" placeholder="https://example.com/poster.jpg">
                                </div>
                                <button onclick="createMovie()">➕ Добавить фильм</button>
                            </div>
                        </div>

                        <div class="card">
                            <h3>🎬 Список фильмов</h3>
                            <div id="moviesGrid" class="grid">
                                ${moviesList.map(m => `
                                    <div class="movie-card">
                                        ${m.poster_url ? `<img src="${m.poster_url}" alt="${m.title}">` : '<div style="background:#ddd; height:200px; display:flex; align-items:center; justify-content:center;">Нет постера</div>'}
<h4 style="cursor:pointer; color:#667eea;" onclick="location.href='/movie-detail.html?id=${m.id}'">${m.title}</h4>
                                        <p>📅 ${m.release_year || 'Н/Д'}</p>
                                        <p>⏱️ ${m.duration || '?'} мин</p>
                                        <p>🎭 ${m.genre || 'Н/Д'}</p>
                                        <p>🎥 ${m.director || 'Н/Д'}</p>
                                        <p class="rating">⭐ ${m.rating ? m.rating.toFixed(1) : 'Нет оценок'}</p>
                                        <div class="actions" style="margin-top: 10px; display: flex; gap: 10px;">
                                            <button onclick="addReview(${m.id}, 'movie')">✏️ Отзыв</button>
                                            <button class="danger" onclick="deleteMovie(${m.id})">🗑️ Удалить</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        async function createMovie() {
            const movie = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                release_year: parseInt(document.getElementById('releaseYear').value) || 0,
                duration: parseInt(document.getElementById('duration').value) || 0,
                genre: document.getElementById('genre').value,
                director: document.getElementById('director').value,
                poster_url: document.getElementById('posterUrl').value
            };

            if (!movie.title) {
                alert('Введите название фильма');
                return;
            }

            try {
                await request('POST', '/movies', movie);
                showMessage('Фильм добавлен!', 'success');
                loadMovies();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        async function deleteMovie(id) {
            if (confirm('Удалить этот фильм?')) {
                try {
                    await request('DELETE', `/movies/${id}`);
                    showMessage('Фильм удалён', 'success');
                    loadMovies();
                } catch (error) {
                    showMessage(error.message, 'error');
                }
            }
        }

        async function addReview(id, type) {
            const rating = prompt('Ваша оценка (1-10):');
            if (!rating) return;
            
            const comment = prompt('Ваш комментарий:');
            
            const review = {
                rating: parseInt(rating),
                comment: comment || ''
            };
            
            if (type === 'movie') {
                review.movie_id = id;
            } else {
                review.series_id = id;
            }
            
            try {
                await request('POST', '/reviews', review);
                showMessage('Отзыв добавлен!', 'success');
                loadMovies();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function showMessage(msg, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = msg;
            document.body.insertBefore(msgDiv, document.body.firstChild);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        loadMovies();
    </script>
</body>
</html>
