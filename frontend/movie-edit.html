<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать фильм - Media Content</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; margin-bottom: 30px; }
        .header h1 { color: #667eea; font-size: 24px; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #333; padding: 8px 15px; border-radius: 5px; }
        .nav a:hover { background: #667eea; color: white; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .card { background: white; border-radius: 10px; padding: 30px; }
        .card h2 { color: #667eea; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .btn { padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .message { padding: 12px; margin-bottom: 20px; border-radius: 5px; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .back-btn { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const API_BASE = '/api';
        function getToken() { return localStorage.getItem('token'); }
        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }

        async function request(method, endpoint, body = null) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(`${API_BASE}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : null });
            if (response.status === 401) { localStorage.removeItem('token'); window.location.href = '/login.html'; }
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Ошибка');
            return data;
        }

        async function loadEditPage() {
            const token = getToken();
            if (!token) { window.location.href = '/login.html'; return; }

            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');
            if (!movieId) { window.location.href = '/movies.html'; return; }

            try {
                const userData = await request('GET', '/user');
                const movieData = await request('GET', `/movies/${movieId}`);
                const movie = movieData.data;

                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="header">
                            <h1>🎬 Редактировать фильм</h1>
                            <div class="nav">
                                <a href="/index.html">Главная</a>
                                <a href="/movies.html">Фильмы</a>
                                <a href="/series.html">Сериалы</a>
                                <a href="/favorites.html">Избранное</a>
                            </div>
                            <div class="user-info">
                                <span>👤 ${userData.user.username}</span>
                                <button class="logout-btn" onclick="logout()">Выйти</button>
                            </div>
                        </div>
                        <button class="back-btn" onclick="history.back()">← Назад</button>
                        <div class="card">
                            <h2>✏️ Редактирование фильма</h2>
                            <div id="message"></div>
                            <div class="form-group">
                                <label>Название *</label>
                                <input type="text" id="title" value="${escapeHtml(movie.title)}">
                            </div>
                            <div class="form-group">
                                <label>Описание</label>
                                <textarea id="description" rows="4">${escapeHtml(movie.description || '')}</textarea>
                            </div>
                            <div class="form-group">
                                <label>Год выпуска</label>
                                <input type="number" id="releaseYear" value="${movie.release_year || ''}">
                            </div>
                            <div class="form-group">
                                <label>Длительность (мин)</label>
                                <input type="number" id="duration" value="${movie.duration || ''}">
                            </div>
                            <div class="form-group">
                                <label>Жанр</label>
                                <input type="text" id="genre" value="${escapeHtml(movie.genre || '')}">
                            </div>
                            <div class="form-group">
                                <label>Режиссёр</label>
                                <input type="text" id="director" value="${escapeHtml(movie.director || '')}">
                            </div>
                            <div class="form-group">
                                <label>URL постера</label>
                                <input type="text" id="posterUrl" value="${escapeHtml(movie.poster_url || '')}">
                            </div>
                            <button class="btn btn-primary" onclick="updateMovie(${movie.id})">💾 Сохранить изменения</button>
                            <button class="btn btn-secondary" onclick="history.back()">Отмена</button>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('app').innerHTML = `<div class="container"><div class="card"><h3>Ошибка</h3><p>${error.message}</p></div></div>`;
            }
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        async function updateMovie(id) {
            const updatedMovie = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                release_year: parseInt(document.getElementById('releaseYear').value) || 0,
                duration: parseInt(document.getElementById('duration').value) || 0,
                genre: document.getElementById('genre').value,
                director: document.getElementById('director').value,
                poster_url: document.getElementById('posterUrl').value
            };

            if (!updatedMovie.title) { showMessage('Введите название фильма', 'error'); return; }

            try {
                await request('PUT', `/movies/${id}`, updatedMovie);
                showMessage('Фильм успешно обновлён!', 'success');
                setTimeout(() => { window.location.href = `/movie-detail.html?id=${id}`; }, 1000);
            } catch (error) { showMessage(error.message, 'error'); }
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => { msgDiv.innerHTML = ''; }, 3000);
        }

        loadEditPage();
    </script>
</body>
</html>
