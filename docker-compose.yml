services:
  postgres:
    image: postgres:15-alpine
    container_name: media-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - media-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: media-app
    restart: always
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: media_db
      DB_PORT: 5432
      PORT: 8080
      JWT_SECRET: my-super-secret-key
      JWT_EXPIRE_HOURS: 24
      GIN_MODE: release
      OMDB_API_KEY: ${OMDB_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - media-network

  nginx:
    image: nginx:alpine
    container_name: media-frontend
    restart: always
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - media-network

networks:
  media-network:
    driver: bridge

volumes:
  postgres_data: